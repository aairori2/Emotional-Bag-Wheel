<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="My Bag" />
<link rel="apple-touch-icon" href="icon.PNG">
<link rel="icon" type="image/png" href="icon.PNG">
<link rel="apple-touch-icon" sizes="180x180" href="icon.PNG">
<title>My Bag</title>

<style>
:root {
  --bg:#1C1812;--bg2:#2A2218;--bg3:#221E14;
  --border:#3A2E20;--border2:rgba(58,46,32,0.4);
  --text:#E8D9B8;--text2:#C8B890;--text3:#A08060;--text4:#6A5A40;
  --empty:#4A3A28;--shadow:rgba(0,0,0,0.5);--gold:#E8C87A;
}
.light {
  --bg:#F5F0E8;--bg2:#EDE6D8;--bg3:#E8E0D0;
  --border:#C8B898;--border2:rgba(200,184,152,0.35);
  --text:#2A2018;--text2:#4A3828;--text3:#7A5A38;--text4:#9A7A58;
  --empty:#B8A888;--shadow:rgba(0,0,0,0.12);--gold:#9A6A28;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Georgia',serif;background:var(--bg);color:var(--text);}

/* FIXED TABS */
.tabs{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;flex-direction:row; /* FORCE HORIZONTAL */
  background:var(--bg2);
  border-top:1px solid var(--border);
  z-index:100;
}
.tab{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:10px 0;
}
.tab-icon{font-size:22px;}
.tab-label{font-size:10px;color:var(--text3);}
.tab.active .tab-label{color:var(--gold);}

/* WHEEL */
.wheel-wrap{width:min(390px,100%);margin:20px auto;}
svg{width:100%;}

/* TEXT FIXES */
.wheel-emoji{font-size:14px;}
.wheel-label{font-size:11px;} /* slightly bigger but safe */

.center-big{font-size:10.5px;}
.center-small{font-size:9px;}

</style>
</head>

<body>

<div class="wheel-wrap">
<svg id="wheel" viewBox="0 0 400 400"></svg>
</div>

<div class="tabs">
  <div class="tab active"><span class="tab-icon">🎡</span><span class="tab-label">Wheel</span></div>
  <div class="tab"><span class="tab-icon">📋</span><span class="tab-label">Log</span></div>
  <div class="tab"><span class="tab-icon">🎒</span><span class="tab-label">My Bag</span></div>
</div>

<script>
const emotions=[
"Bored","Sad","Restless","Angry","Depressed",
"Anxious","Lonely","Happy","Joyful","Playful","Curious","Low Energy"
];

const CX=200,CY=200,R=160,IR=70;
const SLICE=360/emotions.length;

function polar(r,deg){
  const rad=(deg-90)*Math.PI/180;
  return {x:CX+r*Math.cos(rad),y:CY+r*Math.sin(rad)};
}

function arc(s,e){
  const p1=polar(R,s),p2=polar(R,e),p3=polar(IR,e),p4=polar(IR,s);
  const large=e-s>180?1:0;
  return `M${p1.x} ${p1.y} A${R} ${R} 0 ${large} 1 ${p2.x} ${p2.y}
          L${p3.x} ${p3.y} A${IR} ${IR} 0 ${large} 0 ${p4.x} ${p4.y}Z`;
}

const svg=document.getElementById('wheel');

emotions.forEach((label,i)=>{
  const start=i*SLICE,end=start+SLICE,mid=start+SLICE/2;

  const path=document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d",arc(start,end));
  path.setAttribute("fill","#2A2218");
  path.setAttribute("stroke","#C9A84C66");

  const emoji=document.createElementNS("http://www.w3.org/2000/svg","text");
  const ep=polar(105,mid);
  emoji.setAttribute("x",ep.x);
  emoji.setAttribute("y",ep.y);
  emoji.setAttribute("text-anchor","middle");
  emoji.setAttribute("class","wheel-emoji");
  emoji.textContent="•";

  const text=document.createElementNS("http://www.w3.org/2000/svg","text");
  const tp=polar(130,mid);
  text.setAttribute("x",tp.x);
  text.setAttribute("y",tp.y);
  text.setAttribute("text-anchor","middle");
  text.setAttribute("class","wheel-label");
  text.textContent=label;

  svg.appendChild(path);
  svg.appendChild(emoji);
  svg.appendChild(text);
});

/* CENTER TEXT FIXED */
function center(txt,y,cls){
  const t=document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("x",CX);
  t.setAttribute("y",y);
  t.setAttribute("text-anchor","middle");
  t.setAttribute("class",cls);
  t.textContent=txt;
  svg.appendChild(t);
}

center("🎒",190,"");
center("Your Bag",215,"center-big");
center("is ready",230,"center-small");

</script>

</body>
</html>
