<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1C1812" />

<title>Emotional Loadout</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: radial-gradient(circle at 20% 20%, #2A2218 0%, #1C1812 60%);
  color: #EDE3C7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 18px;
  transition: background 0.5s ease;
}

body.morning { background: #F4EFE6; color: #2A2218; }
body.morning .card { background: #FFFFFF; color: #2A2218; }
body.morning .empty-card { color: #777; }

.header { text-align: center; margin-bottom: 28px; }
.header-sub { font-size: 12px; letter-spacing: 3px; color: #A08060; }
.header h1 { font-size: 32px; font-weight: 500; }
.header p { font-size: 14px; color: #8A7A60; margin-top: 8px; }

.wheel-wrap { width: min(420px, 95vw); margin-bottom: 28px; }
svg { width: 100%; touch-action: none; cursor: pointer; }

.card-wrap { width: 100%; max-width: 460px; }

.card {
  background: linear-gradient(145deg, #2B241A, #201A12);
  border-radius: 18px;
  padding: 24px;
  border-left: 4px solid;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.card-top { display: flex; justify-content: space-between; margin-bottom: 14px; }
.card-label { font-size: 20px; font-weight: 600; }
.card-emoji { font-size: 26px; margin-right: 8px; }
.card-sublabel { font-size: 11px; letter-spacing: 2px; color: #6A5A40; }
.mission-text { font-size: 16px; line-height: 1.7; margin: 14px 0; }
.section-label { font-size: 11px; letter-spacing: 2px; color: #A08060; margin-top: 10px; }
.items { display: flex; flex-wrap: wrap; gap: 8px; }
.item-tag { font-size: 13px; padding: 6px 12px; border-radius: 20px; border: 1px solid; }
.shuffle-btn { border-radius: 24px; padding: 8px 14px; font-size: 13px; border: 1px solid; cursor: pointer; }
.empty-card { text-align: center; padding: 40px; font-size: 15px; color: #5A4A38; border: 1px dashed #3A2E20; border-radius: 16px; }
.log { margin-top: 20px; max-width: 460px; width: 100%; font-size: 12px; color: #8A7A60; }
.log-entry { margin-bottom: 6px; }
</style>
</head>

<body>

<div class="header">
  <div class="header-sub">Pause</div>
  <h1>How are you feeling?</h1>
  <p>Choose intentionally</p>
</div>

<div class="wheel-wrap">
  <svg id="wheel" viewBox="0 0 400 400"></svg>
</div>

<div class="card-wrap">
  <div id="card-container">
    <div class="empty-card">
      Choose how you feel.<br>Your bag will take it from there.
    </div>
  </div>
</div>

<div class="log" id="log"></div>

<script>
const emotions = [
{id:"bored",label:"Bored",emoji:"😐",color:"#C9A84C",items:["📷 Camera","🎮 Switch","📖 Book"],missions:["Walk somewhere new.","Play something you've been putting off.","Sketch what’s in front of you."]},
{id:"sad",label:"Sad",emoji:"😢",color:"#7B9EA8",items:["📔 Journal","📿 Rosary"],missions:["Write everything out.","Sit quietly.","Read one chapter."]},
{id:"restless",label:"Restless",emoji:"😤",color:"#C17E4A",items:["📷 Camera","👟 Walk"],missions:["Walk fast.","Explore randomly.","Climb somewhere high."]},
{id:"angry",label:"Angry",emoji:"😠",color:"#B85C5C",items:["👟 Walk","📔 Journal"],missions:["Walk it out.","Write it raw.","Find beauty."]},
{id:"depressed",label:"Depressed",emoji:"😞",color:"#7A7A9A",items:["📿 Rosary","📖 Book"],missions:["Sit outside.","Read two pages.","Be around people."]},
{id:"anxious",label:"Anxious",emoji:"😰",color:"#6B9E7A",items:["📿 Rosary","📔 Journal"],missions:["Write thoughts.","Slow walk.","Focus on something small."]},
{id:"lonely",label:"Lonely",emoji:"😔",color:"#9E7AB5",items:["📖 Book","🎮 Switch"],missions:["Go somewhere public.","Write about someone.","Play a game."]},
{id:"happy",label:"Happy",emoji:"😊",color:"#E8A838",items:["📷 Camera","📔 Journal"],missions:["Document your day.","Write why.","Go to your favorite place."]}
];

const TOTAL = emotions.length;
const SLICE = 360 / TOTAL;
const CX=200,CY=200,R=170;
let active = localStorage.getItem("lastEmotion") || null;
let idx = {};
emotions.forEach(e=>idx[e.id]=0);

/* TIME THEME */
const hour = new Date().getHours();
if(hour < 12) document.body.classList.add("morning");

/* WHEEL FUNCTIONS */
function polar(r,deg){ const rad=(deg-90)*Math.PI/180; return [CX+r*Math.cos(rad),CY+r*Math.sin(rad)]; }

function buildWheel(){
  const svg=document.getElementById("wheel");
  svg.innerHTML="";
  emotions.forEach((e,i)=>{
    const start=i*SLICE,end=start+SLICE;
    const [x1,y1]=polar(R,start);
    const [x2,y2]=polar(R,end);
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M${CX} ${CY} L${x1} ${y1} A${R} ${R} 0 0 1 ${x2} ${y2}Z`);
    path.setAttribute("fill",e.color);
    path.setAttribute("stroke","#fff");
    path.setAttribute("stroke-width","2");
    path.dataset.id=e.id;
    path.addEventListener("click",()=>clickEmotion(e.id));
    path.addEventListener("mouseover",()=>highlightSlice(e.id));
    path.addEventListener("mouseout",()=>highlightSlice(null));
    svg.appendChild(path);

    // Text label
    const mid = start + SLICE/2;
    const [tx,ty] = polar(R*0.65, mid);
    const text = document.createElementNS("http://www.w3.org/2000/svg","text");
    text.setAttribute("x",tx);
    text.setAttribute("y",ty);
    text.setAttribute("fill","#fff");
    text.setAttribute("font-size","14");
    text.setAttribute("font-weight","bold");
    text.setAttribute("text-anchor","middle");
    text.setAttribute("alignment-baseline","middle");
    text.textContent = e.label;
    svg.appendChild(text);
  });
}

let highlighted = null;
function highlightSlice(id){
  highlighted = id;
  const svg=document.getElementById("wheel");
  svg.querySelectorAll("path").forEach(p=>{
    if(p.dataset.id===highlighted){
      p.setAttribute("transform","scale(1.05 1.05) translate(-9 -9)");
      p.setAttribute("stroke-width","4");
      p.setAttribute("stroke","#fff");
    } else {
      p.setAttribute("transform","");
      p.setAttribute("stroke-width","2");
    }
  });
}

/* CLICK */
function clickEmotion(id){
  if(active===id){
    idx[id]=Math.floor(Math.random()*emotions.find(e=>e.id===id).missions.length);
  } else active=id;
  localStorage.setItem("lastEmotion", active);
  saveLog(active, emotions.find(e=>e.id===active).missions[idx[active]]);
  renderCard(); renderLog();
}

/* CARD */
function renderCard(){
  const c=document.getElementById("card-container");
  if(!active){
    c.innerHTML=`<div class="empty-card">Choose how you feel.<br>Your bag will take it from there.</div>`;
    return;
  }
  const e=emotions.find(x=>x.id===active);
  const m=e.missions[idx[active]];
  c.innerHTML=`
  <div class="card" style="border-color:${e.color}">
    <div class="card-top">
      <div>
        <span class="card-emoji">${e.emoji}</span>
        <span class="card-label" style="color:${e.color}">${e.label}</span>
        <div class="card-sublabel">This is where you are</div>
      </div>
      <button class="shuffle-btn" style="border-color:${e.color}">Another way</button>
    </div>

    <div class="section-label">Reach For</div>
    <div class="items">
      ${e.items.map(i=>`<span class="item-tag" style="border-color:${e.color}">${i}</span>`).join("")}
    </div>

    <div class="section-label">Try this</div>
    <div class="mission-text">"${m}"</div>
  </div>`;

  document.querySelector(".shuffle-btn").onclick=()=>clickEmotion(active);
}

/* LOG */
function saveLog(emotion, mission){
  const logs = JSON.parse(localStorage.getItem("logs") || "[]");
  logs.unshift({emotion, mission, time: new Date().toLocaleTimeString()});
  localStorage.setItem("logs", JSON.stringify(logs.slice(0,10)));
}

function renderLog(){
  const logs = JSON.parse(localStorage.getItem("logs") || "[]");
  const container = document.getElementById("log");
  container.innerHTML = logs.map(l=>`<div class="log-entry">${l.time} — ${l.emotion}</div>`).join("");
}

/* INITIALIZE */
buildWheel();
renderCard();
renderLog();
</script>

</body>
</html>
